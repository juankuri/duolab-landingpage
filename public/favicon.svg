  <style><![CDATA[
    /* Purple reads fine on a light browser chrome; on dark chrome the same
       purple nearly disappears, so swap to white when the OS/browser is in
       dark mode. Supported by Chromium/Firefox/Safari reading prefers-color-scheme
       inside an SVG favicon -- no second file or JS needed. */
    .tube { fill: #68286b; }
    @media (prefers-color-scheme: dark) {
      .tube { fill: #ffffff; }
    }
